<?xml version="1.0" encoding="UTF-8"?>
<!--
  dgbwallet app mark. Rounded-square DigiByte-blue tile with a white
  wallet-card silhouette. Inside the card pocket sits a miniaturised
  DigiByte "D" so the logo reads as "DigiByte, in a wallet".

  Designed to be a direct drop-in wherever /digibyte-logo.svg is used
  when the surface is specifically the wallet (not the DigiByte chain
  itself). The sibling mark for DigiPay is /digipay-logo.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="dgbwallet">
    <defs>
        <linearGradient id="dgbwalletBg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0066CC"/>
            <stop offset="100%" stop-color="#002352"/>
        </linearGradient>
    </defs>

    <!-- Tile background -->
    <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#dgbwalletBg)"/>

    <!-- Wallet body: a slightly-tilted rounded card, back pocket visible -->
    <g transform="translate(12 18)">
        <!-- Back flap (darker, suggests depth) -->
        <rect x="1" y="3" width="38" height="24" rx="4" ry="4" fill="#001529" opacity="0.35"/>

        <!-- Wallet front -->
        <rect x="0" y="0" width="40" height="26" rx="5" ry="5" fill="#ffffff"/>

        <!-- Card-slot clasp on the right edge -->
        <rect x="28" y="9" width="14" height="8" rx="2" ry="2" fill="#0066CC"/>
        <circle cx="36" cy="13" r="1.4" fill="#ffffff"/>
    </g>

    <!-- Mini DigiByte "D" in the front pocket -->
    <g transform="translate(18 25)" fill="#0066CC">
        <path d="M0 0 h7 a6 6 0 0 1 0 12 h-7 z M3 3 v6 h4 a3 3 0 0 0 0 -6 z"/>
    </g>
</svg>
