    <!-- Security headers. style-src is strict; element-level style="…"
         allowed via style-src-attr. script-src is strict; the lone
         inline <script type="application/ld+json"> below is covered
         by the sha256 hash listed here.

         At PUBLISH time, tools/inject-csp-hashes.py rewrites this CSP
         to add a second hash for the <script type="importmap"> that
         Blazor's publish pipeline injects with the fingerprinted asset
         names. Dev runs (dotnet run) don't inject the importmap, so
         the source CSP works as-is locally without the post-processor. -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'wasm-unsafe-eval' 'sha256-9bavI8EbC3zaLAHJbePVI89bUOgWfFdz4BuYNjszAsY=' https://www.googletagmanager.com;
                   style-src 'self';
                   style-src-attr 'unsafe-inline';
                   img-src 'self' data: blob: https://avatars.githubusercontent.com https://www.googletagmanager.com;
                   font-src 'self';
                   connect-src 'self' http://localhost:5007 https://digiexplorer.info https://digibyteblockexplorer.com https://digibyte-api-production.up.railway.app https://api.coingecko.com https://api.github.com https://www.google-analytics.com https://www.googletagmanager.com https://analytics.google.com ws: wss:;
                   frame-src 'none';
                   object-src 'none';
                   base-uri 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="no-referrer" />

    <title>DigiByte Wallet — Self-Custodial DGB Wallet</title>
    <base href="/" />
    <link rel="canonical" href="https://dgbwallet.app/" />

    <!-- Google Analytics. The bootstrap (window.dataLayer + gtag config)
         lives in js/analytics.js so the page CSP can stay strict; gtag.js
         itself is loaded async from googletagmanager.com without an SRI
         hash because Google rotates that file unannounced. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NR6R1MNL9X" crossorigin="anonymous"></script>
    <script src="js/analytics.js" defer></script>

    <link rel="preload" id="webassembly" />

    <!-- Self-hosted Tailwind (purged & minified) -->
    <link rel="stylesheet" href="css/tailwind.css" />
    <!-- Splash screen styles — extracted from inline <style> so CSP
         can drop 'unsafe-inline' on style-src. -->
    <link rel="stylesheet" href="css/splash.css" />

    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/app.css" />
    <!-- Product-specific wallet mark. Separate from the DigiByte chain
         favicon.svg so the browser tab reads as dgbwallet, not as the
         Foundation. Fallback chain: SVG → 192px PNG. -->
    <link rel="icon" type="image/svg+xml" href="dgbwallet-logo.svg" />
    <link rel="icon" type="image/png" href="dgbwallet-logo-192.png" />
    <link href="DigiByte.Web.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="dgbwallet-logo-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="dgbwallet-logo-192.png" />
    <script type="importmap"></script>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "DigiByte Wallet",
        "url": "https://dgbwallet.app",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "description": "Self-custodial DigiByte wallet with Digi-ID authentication, QR scanning, multisig, and P2P trading.",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        }
    }
    </script>
</head>
