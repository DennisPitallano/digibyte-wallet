<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#002352" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DGB Wallet" />
    <meta name="description" content="Self-custodial DigiByte wallet with Digi-ID, QR scanning, and P2P trading." />

    <!-- Security headers -->

          content="default-src 'self';
                   script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline';
                   style-src 'self' 'unsafe-inline';

                   font-src 'self';
                   connect-src 'self' http://localhost:5007 https://digiexplorer.info https://digibyteblockexplorer.com https://digibyte-api-production.up.railway.app https://api.coingecko.com https://api.github.com ws: wss:;
                   frame-src 'none';
                   object-src 'none';
                   base-uri 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="no-referrer" />

    <title>DigiByte Wallet</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preload" href="fonts/inter-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Self-hosted Tailwind (purged & minified) -->

    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/app.css" />

    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="DigiByte.Web.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body class="font-sans bg-slate-50 dark:bg-dgb-950 text-slate-900 dark:text-white antialiased">
    <div id="app">
        <style>
            #splash{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:linear-gradient(160deg,#001529 0%,#002352 40%,#003d7a 100%);gap:1.5rem}
            #splash svg{filter:drop-shadow(0 0 30px rgba(0,102,204,.35))}
            @keyframes splash-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}
            @keyframes splash-bar{0%{width:0}100%{width:100%}}
            .splash-logo{animation:splash-pulse 2s ease-in-out infinite}
            .splash-track{width:120px;height:3px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden}
            .splash-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#0066CC,#4d94ff);animation:splash-bar 1.8s ease-in-out infinite}
        </style>
        <div id="splash">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 479.8 479.8" width="72" height="72" class="splash-logo">
                <circle cx="239.9" cy="239.9" r="219.5" fill="#002352" stroke="#06c" stroke-miterlimit="10" stroke-width="40.8"/>
                <path fill="#fff" d="M116.9 182.9h155s53.5-.5 16.5 68.5c0 0-27 54-94 53l36.1-92.2a7.3 7.3 0 0 0-6.6-10l-47.5-.8-60 146s20 2 31 1l-6 15h28.3a3.8 3.8 0 0 0 3.6-2.5l5.1-13.5 12-1-7 17H211a5 5 0 0 0 4.7-3.2l7.7-19.8s84-14 122-82c0 0 51-79-9-107a116 116 0 0 0-37-10l7-17.3a3.4 3.4 0 0 0-3.1-4.7h-25.9l-8 21h-11l6.2-16.3a3.5 3.5 0 0 0-3.2-4.7h-26l-8 21h-80.8a12 12 0 0 0-10.6 6.3z"/>
            </svg>
            <p style="font-size:.875rem;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.05em">DigiByte Wallet</p>
            <div class="splash-track"><div class="splash-fill"></div></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x1F5D9;</span>
    </div>
    <script src="js/pwa-install.js"></script>
    <script src="js/dom-helpers.js" defer></script>
    <script src="js/crypto.js" defer></script>
    <script src="js/storage.js" defer></script>
    <script src="js/network.js" defer></script>
    <script src="js/nfc.js" defer></script>
    <script src="js/qrscanner.js" defer></script>
    <script src="js/download.js" defer></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' }).then(reg => {
            // Check for updates every 60 minutes
            setInterval(() => reg.update(), 60 * 60 * 1000);

            // Detect when a new service worker is waiting
            function onNewSW(sw) {
                if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                    window._swWaiting = sw;
                    if (window._pwaUpdateCallback) {
                        window._pwaUpdateCallback.invokeMethodAsync('OnUpdateAvailable');
                    }
                }
            }

            if (reg.waiting) { onNewSW(reg.waiting); }

            reg.addEventListener('updatefound', () => {
                const newSW = reg.installing;
                if (!newSW) return;
                newSW.addEventListener('statechange', () => onNewSW(newSW));
            });
        });

        // Reload once the new SW takes over
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) { refreshing = true; location.reload(); }
        });

        window.pwaUpdate = {
            registerCallback: (dotnetRef) => {
                window._pwaUpdateCallback = dotnetRef;
                if (window._swWaiting) {
                    dotnetRef.invokeMethodAsync('OnUpdateAvailable');
                }
            },
            skipWaiting: () => {
                if (window._swWaiting) {
                    window._swWaiting.postMessage({ type: 'SKIP_WAITING' });
                }
            }
        };
    </script>
</body>

</html>
