server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Blazor WASM content types
    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
        application/octet-stream dll;
        application/json blazorboot json;
    }

    # Enable gzip/brotli for WASM, DLL, and JS files
    gzip on;
    gzip_types application/wasm application/octet-stream application/javascript application/json text/css text/html;

    # Serve pre-compressed .br and .gz files if available
    location ~* \.(dll|wasm|js|css|json)$ {
        gzip_static on;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker must not be cached
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /service-worker-assets.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
