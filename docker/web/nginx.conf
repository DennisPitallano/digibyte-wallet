server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Blazor WASM additional content types (http-level mime.types already included by nginx default)
    types {
        application/wasm   wasm;
        application/octet-stream dll;
        application/json   json;
        application/json   blazorboot;
    }

    # Enable gzip for WASM, DLL, and JS files
    gzip on;
    gzip_types application/wasm application/octet-stream application/javascript application/json text/css text/html;

    # index.html must never be cached — this is what the browser fetches to bootstrap the PWA
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Serve pre-compressed .br and .gz files if available (immutable hashed assets)
    location ~* \.(dll|wasm|js|css)$ {
        gzip_static on;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Service worker and asset manifest must not be cached
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /service-worker-assets.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
