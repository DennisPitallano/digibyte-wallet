# DigiByte Core Mainnet Configuration (pruned for production)
# Pruned node — keeps only recent blocks to save disk space.
# scantxoutset still works (UTXO set is always maintained).
# getrawtransaction works for mempool txs and recent blocks only.
server=1
daemon=0
printtoconsole=1
listen=1

# Pruning: keep 550 MB of block data (~minimal allowed)
# This saves ~35+ GB of disk vs a full node.
# The UTXO set is always fully available regardless of pruning.
prune=550

# txindex=1 is NOT compatible with pruning — do not enable it.
# Use scantxoutset for address balance/UTXO lookups instead.

# RPC settings in [main] section
[main]
rpcuser=dgbrpc
rpcpassword=changeme_in_production
rpcallowip=0.0.0.0/0
rpcbind=0.0.0.0
rpcport=14022
rpcthreads=4

# Performance tuning for Railway (limited resources)
dbcache=256
maxmempool=50
maxconnections=24
