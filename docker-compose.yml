services:
  # DigiByte Core regtest node (instant mining)
  digibyted:
    build:
      context: docker/digibyted
    container_name: dgb-regtest-node
    ports:
      - "18444:18444"   # Regtest P2P
      - "18443:18443"   # Regtest RPC
    volumes:
      - dgb-regtest-data:/root/.digibyte
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "digibyte-cli", "-regtest", "-rpcuser=dgbrpc", "-rpcpassword=changeme", "getblockcount"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # DigiByte Node API (wraps RPC into REST)
  node-api:
    build:
      context: .
      dockerfile: docker/node-api/Dockerfile
    container_name: dgb-node-api
    ports:
      - "5260:5260"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DigiByteNode__Host=digibyted
      - DigiByteNode__TestnetPort=18443
      - DigiByteNode__RpcUser=dgbrpc
      - DigiByteNode__RpcPassword=changeme
      - DigiByteNode__IsTestnet=true
      - DigiByteNode__FaucetEnabled=true
      - DigiByteNode__FaucetMaxAmount=10000
    depends_on:
      digibyted:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dgb-regtest-data:
    name: dgb-regtest-data
