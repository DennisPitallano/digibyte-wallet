<?xml version="1.0" encoding="UTF-8"?>
<!--
  DigiPay app mark. Same rounded-square DigiByte-blue tile as the
  dgbwallet sibling, but the inner mark is an upward-diagonal arrow
  cutting across a payment-receipt silhouette — "send payment in DGB".

  Sibling to /dgbwallet-logo.svg. Both share the gradient tile so the
  two products read as one product family.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DigiPay">
    <defs>
        <linearGradient id="digipayBg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0066CC"/>
            <stop offset="100%" stop-color="#002352"/>
        </linearGradient>
    </defs>

    <!-- Tile background -->
    <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#digipayBg)"/>

    <!-- Receipt / invoice silhouette (white, with a zig-zag bottom edge) -->
    <g transform="translate(16 12)">
        <path d="M0 0 h26 a4 4 0 0 1 4 4 v32 l-5 -3 -5 3 -5 -3 -5 3 -5 -3 -5 3 v-32 a4 4 0 0 1 4 -4 z"
              fill="#ffffff"/>

        <!-- Receipt line items -->
        <rect x="6" y="8" width="18" height="2" rx="1" fill="#0066CC" opacity="0.25"/>
        <rect x="6" y="13" width="14" height="2" rx="1" fill="#0066CC" opacity="0.25"/>
    </g>

    <!-- Upward-right "send" arrow, piercing the receipt -->
    <g transform="translate(26 28)" fill="#0066CC">
        <path d="M2 16 L14 4 H6 V0 H20 V14 H16 V6 L4 18 Z"/>
    </g>
</svg>
